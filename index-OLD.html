<!doctype html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Finize</title>
<link rel="icon" type="image/png" href="finize-logo.png">
<style>
:root{
  --bg:#fbf4ea;
  --bg-soft:#f6eadc;
  --card:#fffdfa;
  --card-hover:#fff7ef;
  --border:#ecdcc9;
  --border-soft:#f3e8d9;
  --text:#2f1f18;
  --text-dim:#705f52;
  --text-faint:#a49282;
  --navy:#6f8a55;
  --navy-bright:#5d7648;
  --navy-deep:#edf3e6;
  --green:#7c8e49;
  --green-soft:#9aae74;
  --green-bg:#eef1df;
  --blue:#4d7fb8;
  --blue-bg:#e9f1fb;
  --terracotta:#c96a48;
  --red:#9f4639;
  --red-bg:#f8e8df;
  --amber:#dfad63;
  --muted:#8e7d6f;
  --warm:#fff3e6;
  --radius:18px;
  --radius-sm:13px;
  --shadow:0 18px 38px rgba(86,56,31,.09), 0 5px 14px rgba(86,56,31,.05);
  --shadow-soft:0 10px 24px rgba(86,56,31,.07), 0 2px 8px rgba(86,56,31,.04);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);}
body{
  background:
    radial-gradient(900px 420px at 18% -10%, rgba(124,142,73,.12), transparent 58%),
    radial-gradient(700px 360px at 100% 0%, rgba(124,142,73,.10), transparent 55%),
    linear-gradient(180deg, #fffaf4 0%, var(--bg) 52%, #f7ecdf 100%),
    var(--bg);
  min-height:100vh;
  padding-bottom:34px;
}
::selection{background:rgba(124,142,73,.22);}
input, select{
  font-family:inherit; color:var(--text); background:#fffaf4;
  border:1px solid var(--border); border-radius:10px; padding:7px 9px; font-size:12.5px;
  outline:none; transition:border-color .16s, box-shadow .16s, background .16s;
}
input:focus, select:focus{ border-color:var(--navy); background:#fff; box-shadow:0 0 0 4px rgba(124,142,73,.16); }
input[type=number]{ text-align:right; width:100px; }
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
input[type=number]{ -moz-appearance:textfield; appearance:textfield; }
input[type=text]{ width:100%; }
input[type=date]{ color-scheme: light; }
input[type=checkbox]{ width:16px; height:16px; accent-color:var(--green); cursor:pointer; }
textarea{
  width:100%; min-height:112px; resize:vertical; font-family:ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
  color:var(--text); background:#fffaf4; border:1px solid var(--border); border-radius:12px; padding:10px; font-size:12px;
}
code, pre{ font-family:ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; }
pre{ white-space:pre-wrap; background:#fffaf4; border:1px solid var(--border-soft); border-radius:12px; padding:10px; font-size:11.5px; color:var(--text-dim); }
button{
  font-family:inherit; cursor:pointer; border:1px solid var(--border);
  background:#fff; color:var(--text); border-radius:12px; padding:7px 12px;
  font-size:12.5px; font-weight:650; transition:background .16s, border-color .16s, box-shadow .16s, color .16s, transform .16s;
}
button:hover{ background:var(--card-hover); border-color:#e0c2ac; box-shadow:var(--shadow-soft); transform:translateY(-1px); }
button.primary{ background:var(--navy); border-color:var(--navy); color:#fff; box-shadow:0 8px 18px rgba(124,142,73,.18); }
button.primary:hover{ background:var(--navy-bright); border-color:var(--navy-bright); }
button.ghost{ background:#fffdfa; border:1px dashed #dfc9b4; color:var(--text-dim); }
button.danger-ghost{ background:transparent; border:1px solid transparent; color:var(--text-faint); padding:3px 6px; font-size:15px; line-height:1; }
button.danger-ghost:hover{ color:var(--red); border-color:var(--red); background:var(--red-bg); }
button.small{ padding:4px 8px; font-size:12px; }

.topbar{
  position:sticky; top:0; z-index:20;
  background:rgba(255,250,244,.82); backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(236,220,201,.80);
  padding:30px 18px 18px;
}
.topbar-inner{ max-width:1320px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:18px; flex-wrap:wrap; }
.brand{ display:flex; align-items:center; gap:14px; min-width:280px; }
.brand-logo{ width:46px; height:46px; border-radius:14px; object-fit:cover; box-shadow:0 12px 24px rgba(86,56,31,.13); background:#fff; border:1px solid rgba(236,220,201,.8); }
.brand-dot{ width:38px; height:38px; border-radius:12px 22px 12px 22px; background:linear-gradient(135deg, var(--green), var(--blue)); box-shadow:0 12px 24px rgba(124,142,73,.18); position:relative; }
.brand-dot::after{ content:""; position:absolute; width:18px; height:10px; border:3px solid #fff; border-top:0; border-right:0; left:10px; top:13px; transform:rotate(-35deg); border-radius:0 0 0 10px; }
.brand h1{ font-size:27px; margin:0; font-weight:780; letter-spacing:-.02em; color:#2f1f18; line-height:1.12; }
.brand-subtitle{ color:#846f5f; font-size:13px; line-height:1.35; margin-top:5px; max-width:620px; }
.save-status{ font-size:14px; color:#846f5f; margin-top:6px; display:flex; align-items:center; gap:8px; cursor:pointer; width:max-content; max-width:100%; }
.save-status::before{ content:""; width:9px; height:9px; border-radius:50%; background:var(--green); box-shadow:0 0 0 4px rgba(124,142,73,.12); flex:0 0 auto; }
.save-status.offline::before{ background:var(--red); box-shadow:0 0 0 4px rgba(159,70,57,.11); }
.save-status:hover{ color:var(--text); }

.scenario-toggle{ display:flex; align-items:center; gap:4px; background:#fffdfa; border:1px solid var(--border); border-radius:18px; padding:4px; box-shadow:0 10px 26px rgba(86,56,31,.07); }
.scenario-toggle button{ border:none; background:transparent; border-radius:14px; padding:11px 27px; font-size:14px; color:var(--text-dim); box-shadow:none; min-width:138px; }
.scenario-toggle button:hover{ background:#f4f7ee; box-shadow:none; transform:none; }
.scenario-toggle button.active{ background:var(--navy-deep); color:var(--navy-bright); box-shadow:inset 0 0 0 1px rgba(124,142,73,.22), 0 8px 18px rgba(124,142,73,.12); }

.tabs{ max-width:1320px; margin:16px auto 0; padding:0 18px; display:flex; gap:10px; flex-wrap:wrap; }
.tab-btn{ background:rgba(255,253,250,.92); border:1px solid var(--border); color:#705f52; border-radius:999px; padding:12px 22px; font-size:14px; box-shadow:0 10px 24px rgba(86,56,31,.06); min-height:48px; display:flex; align-items:center; gap:10px; }
.tab-btn:first-child,
.tab-btn:last-child{ border-radius:999px; }
.tab-btn + .tab-btn{ margin-left:0; }
.tab-btn::before{ color:#86604c; font-size:15px; font-weight:800; min-width:18px; text-align:center; }
.tab-btn[data-tab="dashboard"]::before{ content:"▥"; color:var(--green); }
.tab-btn[data-tab="gezamenlijk"]::before{ content:"♚"; }
.tab-btn[data-tab="dion"]::before,
.tab-btn[data-tab="dara"]::before{ content:"D"; background:var(--blue-bg); color:var(--blue); width:24px; height:24px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:12px; min-width:24px; }
.tab-btn[data-tab="spaardoelen"]::before{ content:"◎"; }
.tab-btn[data-tab="data"]::before{ content:"☁"; }
.tab-btn:hover{ background:#f7f9f2; color:var(--text); border-color:#cfdcbe; box-shadow:none; transform:none; }
.tab-btn.active{ background:var(--navy); color:#fff; border-color:var(--navy); box-shadow:0 12px 24px rgba(124,142,73,.18); z-index:1; }
.tab-btn.active::before{ color:#fff; }
.tab-btn.active[data-tab="dion"]::before,
.tab-btn.active[data-tab="dara"]::before{ background:rgba(255,255,255,.22); color:#fff; }

.wrap{ max-width:1320px; margin:20px auto; padding:0 18px; display:none; }
.wrap.active{ display:block; }

.card{
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:22px; margin-bottom:20px; box-shadow:var(--shadow); transform:none;
  transition:box-shadow .18s ease, transform .18s ease, border-color .18s ease;
}
.card:hover{ box-shadow:0 20px 42px rgba(86,56,31,.11), 0 8px 20px rgba(86,56,31,.06); transform:translateY(-1px); border-color:#e1d0bb; }
.card-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; gap:10px; flex-wrap:wrap; }
.card-head h2{ font-size:20px; margin:0; font-weight:760; color:#2f1f18; letter-spacing:-.02em; }
.card-head .hint{ font-size:14px; color:#846f5f; }

.kpi-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; }
.kpi{
  background:#fff; border:1px solid var(--border); border-radius:var(--radius);
  padding:20px 22px; position:relative; overflow:hidden; box-shadow:var(--shadow-soft); isolation:isolate;
}
.kpi:has(input){ border-left:3px solid var(--navy); }
.kpi input[type=number]{ background:#fffaf4; border-color:#ead7c4; border-radius:11px; padding:10px 12px; }
.kpi::before{ content:none; display:none; }
.kpi > *{ position:relative; z-index:1; }
.kpi.pos::before{ background:var(--green); }
.kpi.neg::before{ background:var(--red); }
.kpi .label{ font-size:14px; color:#705f52; margin-bottom:10px; }
.kpi .value{ font-size:24px; font-weight:760; letter-spacing:-.015em; }
.kpi .value.pos{ color:var(--green); }
.kpi .value.neg{ color:var(--red); }

table{ width:100%; border-collapse:collapse; }
th{ text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.055em; color:#9b846f; padding:10px 10px; border-bottom:1px solid var(--border); background:#fff8f0; }
td{ padding:11px 10px; border-bottom:1px solid var(--border-soft); font-size:14px; vertical-align:middle; }
tbody tr:hover td{ background:#fff8f0; }
tr:last-child td{ border-bottom:none; }
td.num{ text-align:right; }
.tot-row td{ font-weight:760; border-top:1px solid var(--border); border-bottom:none; padding-top:13px; background:#fff8f0; }
.tot-row .value.pos{ color:var(--green); }
.tot-row .value.neg{ color:var(--red); }
.row-actions{ text-align:center; width:30px; }
.add-row-btn{ margin-top:10px; }
.list-summary{
  display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
  background:#fff8f0; border:1px solid var(--border-soft); border-radius:var(--radius-sm);
  padding:10px 12px; margin-bottom:10px;
}
.list-summary strong{ font-size:13px; }
.list-summary .hint{ font-size:11.5px; color:var(--text-faint); }
.move-select{ width:116px; padding:4px 6px; font-size:12px; }

.progress-track{ background:#ece4d8; border:1px solid #e5d7c7; border-radius:999px; height:9px; overflow:hidden; width:100%; min-width:70px; }
.progress-fill{ height:100%; background:linear-gradient(90deg, var(--blue), var(--green)); border-radius:999px; }
.progress-label{ font-size:11px; color:var(--text-dim); margin-top:3px; text-align:right; }

.donut-row{ display:flex; gap:14px; flex-wrap:wrap; }
.donut{
  width:108px; height:108px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  background: conic-gradient(var(--green) calc(var(--pct,0)*1%), #f0e2d2 0);
  flex:0 0 auto;
}
.donut-inner{ width:78px; height:78px; border-radius:50%; background:var(--card); display:flex; align-items:center; justify-content:center; flex-direction:column; }
.donut-inner b{ font-size:20px; }
.donut-inner span{ font-size:11px; color:var(--text-faint); }
.donut-wrap{ display:flex; flex-direction:column; align-items:center; gap:10px; width:142px; }
.donut-wrap .name{ font-size:14px; color:#705f52; text-align:center; line-height:1.45; }

.goal{
  background:#fff8f0; border:1px solid var(--border-soft); border-radius:var(--radius-sm);
  padding:14px; margin-bottom:12px;
}
.goal-top{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px; }
.goal-name-input{ font-weight:720; font-size:14px; border:none; background:transparent; padding:2px 0; width:auto; min-width:80px; }
.goal-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-bottom:8px; }
.goal-grid label{ display:block; font-size:10.5px; color:var(--text-faint); margin-bottom:3px; }
.goal-grid input{ width:100%; }
.goal-stats{ display:flex; gap:16px; flex-wrap:wrap; font-size:12px; color:var(--text-dim); margin-top:6px; }
.goal-stats b{ color:var(--text); }

.section-title{ font-size:12px; text-transform:uppercase; letter-spacing:.075em; color:var(--text-faint); margin:22px 0 10px; padding-top:6px; border-top:1px solid var(--border-soft); }
.section-title:first-child{ border-top:none; margin-top:0; }
.app-section{ margin:0 0 20px; }
.section-header{ display:flex; align-items:flex-end; justify-content:space-between; gap:14px; flex-wrap:wrap; margin:0 0 12px; }
.section-header h2{ margin:0; font-size:23px; letter-spacing:-.025em; color:var(--text); }
.section-header p{ margin:4px 0 0; color:var(--text-dim); font-size:13px; line-height:1.4; }
.section-kicker{ text-transform:uppercase; letter-spacing:.08em; color:var(--green); font-size:11px; font-weight:850; }
.section-grid{ display:grid; grid-template-columns:repeat(12,minmax(0,1fr)); gap:16px; align-items:start; }
.manage-stack{ display:grid; gap:12px; }
.manage-section{ background:var(--card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow-soft); overflow:hidden; }
.manage-section[open]{ box-shadow:var(--shadow); }
.manage-section summary{ cursor:pointer; list-style:none; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:15px 18px; font-weight:820; color:var(--text); }
.manage-section summary::-webkit-details-marker{ display:none; }
.manage-section summary::after{ content:"⌄"; color:var(--text-faint); transition:transform .16s; }
.manage-section[open] summary::after{ transform:rotate(180deg); }
.manage-body{ padding:0 18px 18px; }
.manage-section .card{ box-shadow:none; border-color:var(--border-soft); margin-bottom:0; }
.status-kpi{ min-height:118px; gap:8px; justify-content:flex-start; }
.status-kpi .metric-value{ font-size:22px; }
.flow-card{ display:grid; gap:14px; }
.flow-steps{ display:grid; grid-template-columns:repeat(auto-fit,minmax(126px,1fr)); gap:10px; }
.flow-step{ background:#fff8f0; border:1px solid var(--border-soft); border-radius:15px; padding:12px; display:grid; gap:5px; }
.flow-step span{ color:var(--text-faint); font-size:11px; font-weight:800; }
.flow-step strong{ font-size:16px; font-variant-numeric:tabular-nums; }
.goal-card-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:10px; }
.goal-card{
  background:#fffdf9; border:1px solid var(--border); border-radius:16px; padding:12px;
  display:grid; gap:9px; min-width:0; box-shadow:var(--shadow-soft);
}
.goal-card-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
.goal-card-title{ display:flex; gap:11px; align-items:flex-start; min-width:0; }
.goal-thumb{ width:38px; height:38px; border-radius:13px; display:flex; align-items:center; justify-content:center; flex:0 0 auto; background:var(--green-bg); color:var(--green); font-size:19px; box-shadow:inset 0 0 0 1px rgba(124,142,73,.12); }
.goal-card h3{ margin:0; font-size:14px; line-height:1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.goal-owner{ margin-top:3px; color:var(--text-faint); font-size:11.5px; font-weight:750; }
.goal-money{ display:flex; justify-content:space-between; gap:10px; color:var(--text-dim); font-size:12px; }
.goal-money strong{ color:var(--text); white-space:nowrap; }
.goal-card-foot{ display:flex; align-items:center; justify-content:space-between; gap:10px; color:var(--text-faint); font-size:11.5px; }
.goal-card-foot button{ padding:5px 9px; font-size:11.5px; box-shadow:none; }
.goal-group-block{ display:grid; gap:10px; }
.goal-group-title{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:0 2px; }
.goal-group-title h3{ margin:0; font-size:16px; }
.muted-empty{ color:var(--text-faint); background:#fff8f0; border:1px dashed var(--border); border-radius:14px; padding:12px; margin:0; }

.footer-note{ text-align:center; color:#846f5f; font-size:14px; margin-top:26px; }
.toolbar{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
.compact-layout{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; align-items:start; margin-bottom:22px; }
.compact-layout .card{ padding:16px; margin-bottom:0; box-shadow:var(--shadow-soft); overflow-x:visible; }
.compact-layout .card-head{ margin-bottom:10px; }
.compact-layout th{ padding:7px 7px; font-size:10px; }
.compact-layout td{ padding:7px 7px; font-size:12.5px; }
.compact-layout input{ padding:7px 8px; font-size:12.5px; }
.compact-layout input[type=number]{ width:82px; }
.compact-layout .add-row-btn{ margin-top:10px; }
.savings-panel{ margin-top:16px; }
.savings-head{ display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:12px; margin-bottom:12px; }
.goal-table-wrap{ overflow-x:visible; }
.goal-table{ table-layout:fixed; }
.goal-table th{ white-space:normal; line-height:1.25; padding:7px 5px; font-size:10px; }
.goal-table td{ padding:7px 5px; font-size:12px; }
.goal-table input{ padding:7px 8px; font-size:12px; }
.goal-table input[type=text]{ min-width:0; width:100%; }
.goal-table input[type=number]{ width:100%; min-width:58px; }
.goal-table input[type=date]{ width:100%; min-width:112px; }
.goal-table .progress-track{ min-width:54px; margin-top:4px; }
.goal-table tfoot td{ font-weight:700; border-top:1px solid var(--border); padding-top:10px; }
.goal-table .col-name{ width:12%; }
.goal-table .col-money{ width:9%; }
.goal-table .col-progress{ width:9%; }
.goal-table .col-date{ width:12%; }
.goal-table .col-rate{ width:8%; }
.goal-table .col-favorite{ width:32px; }
.goal-table .col-order{ width:38px; }
.goal-table .col-actions{ width:32px; }
.goal-summary-row{ display:flex; justify-content:space-between; gap:12px; margin-top:12px; padding-top:10px; border-top:1px solid var(--border); font-weight:700; }
.favorite-goal{ display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; position:relative; cursor:pointer; }
.favorite-goal input{ position:absolute; opacity:0; width:1px; height:1px; pointer-events:none; }
.favorite-goal span{ display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; border-radius:999px; color:#c0aa8f; border:1px solid var(--border); background:#fff8f0; font-size:15px; line-height:1; }
.favorite-goal input:checked + span{ color:var(--terracotta); background:#fff0df; border-color:#e0ad81; box-shadow:0 8px 18px rgba(201,106,72,.14); }
.goal-order{ display:flex; flex-direction:column; gap:3px; align-items:center; }
.goal-order button{ width:24px; height:22px; padding:0; line-height:1; font-size:12px; }
.goal-order button:disabled{ opacity:.28; cursor:not-allowed; }
.top-actions{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
.month-control{ position:relative; display:flex; align-items:center; gap:8px; }
.month-picker-btn{ min-width:112px; padding:10px 14px; border-radius:14px; background:var(--card); border:1px solid var(--border); color:var(--text); font-weight:800; box-shadow:var(--shadow-soft); }
.month-picker-btn::before{ content:"▦"; margin-right:8px; color:var(--green); font-weight:900; }
.month-picker-btn::after{ content:"⌄"; margin-left:8px; color:var(--muted); font-size:12px; }
.month-popover{ position:absolute; top:calc(100% + 8px); right:0; z-index:30; width:min(310px, calc(100vw - 32px)); padding:12px; border:1px solid var(--border); border-radius:18px; background:#fffdfa; box-shadow:0 24px 60px rgba(63,42,28,.18); display:none; }
.month-control.open .month-popover{ display:block; }
.year-picker{ display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:10px; }
.year-picker button,.month-grid button{ min-width:0; padding:8px 7px; border-radius:12px; box-shadow:none; background:#fff8f0; border:1px solid var(--border); color:var(--text-dim); font-weight:800; }
.year-picker button.active{ background:linear-gradient(135deg, var(--green), var(--green-soft)); color:#fff; border-color:transparent; }
.month-grid button.active{ background:#edf3e6; color:var(--green); border-color:#b9ca9f; box-shadow:inset 0 0 0 1px rgba(89,118,72,.14); }
.month-grid button.current{ background:#fff3e8; border-color:#e7c4a8; color:#9d5636; }
.month-grid button.current.active{ background:#eaf2e2; color:var(--green); border-color:#9fbb83; }
.month-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
.copy-month-btn{ border-style:solid; color:var(--green); }
.dashboard-grid{ display:grid; grid-template-columns:repeat(12,minmax(0,1fr)); gap:12px; }
.dashboard-grid > .card{ padding:17px; margin-bottom:0; }
.dashboard-grid .card-head{ margin-bottom:12px; }
.dashboard-grid .card-head h2{ font-size:17px; }

<div class="modal-backdrop" id="transactionModal"></div>

<script>
/* =========================================================
   Finize — Budget Planner V3 (lokale HTML-versie)
   Rekenmotor is 1-op-1 gebaseerd op de formules uit het
   originele Excel-werkboek (V29).
   ========================================================= */

/* ---------- helpers ---------- */
function round2(n){ return Math.round((n + Number.EPSILON) * 100) / 100; }
function eur(n){
  if (n === null || n === undefined || isNaN(n)) return '€ -';
  const sign = n < 0 ? '-' : '';
  return sign + '€ ' + Math.abs(n).toLocaleString('nl-NL', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function pct(n){ return (Math.round((n||0)*1000)/10) + '%'; }
function percentInputValue(n){
  if (n === null || n === undefined || isNaN(n)) return '';
  return round2((Number(n)||0) * 100);
}
function uid(){ return 'id' + Math.random().toString(36).slice(2,10); }
function formatDateNL(value){
  if (!value) return '';
  const d = new Date(value);
  if (isNaN(d)) return value;
  return String(d.getDate()).padStart(2,'0') + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + d.getFullYear();
}
function getPath(obj, path){
  return path.split('.').reduce((o,k)=> (o==null?o:o[k]), obj);
}
function setPath(obj, path, value){
  const keys = path.split('.');
  let o = obj;
  for (let i=0;i<keys.length-1;i++) o = o[keys[i]];
  o[keys[keys.length-1]] = value;
}
function sumBedrag(list){
  return round2((list||[]).reduce((s,r)=> s + (Number(r.bedrag)||0), 0));
}
function effectiveBedrag(row){
  const b = Number(row.bedrag)||0;
  return row.jaarlijks ? b/12 : b;
}
function sumEffective(list){
  return round2((list||[]).reduce((s,r)=> s + effectiveBedrag(r), 0));
}
const CATEGORY_ICONS = [
  [/huis|hypotheek|vve/i, '⌂'],
  [/water/i, '~'],
  [/energie|eneco|gas|stroom/i, '⚡'],
  [/verzeker/i, '◆'],
  [/belasting/i, '▤'],
  [/entertainment|netflix|prime|disney|spotify/i, '▶'],
  [/internet|telefoon/i, '◌'],
  [/pensioen/i, '▣'],
  [/schuld|correctie|duo/i, '□'],
  [/inkomsten/i, '€'],
  [/variabel|boodschap|benzine|uitjes|kleding/i, '•'],
  [/overig/i, '…'],
];
function categoryIcon(categorie){
  const c = String(categorie||'');
  for (const [re, icon] of CATEGORY_ICONS) if (re.test(c)) return icon;
  return '•';
}
function normalizeCategoryName(categorie){
  const raw = String(categorie||'').trim();
  if (!raw) return 'Overig';
  const normalized = raw.toLowerCase().replace(/\s+/g, ' ');
  const aliases = [
    [/^(belasting|belastingen)$/i, 'Belastingen'],
    [/^entertainment$/i, 'Entertainment'],
    [/^(internet|telefoon|internet\/telefoon|internet & telefoon)$/i, 'Internet/telefoon'],
    [/^verzekeringen?$/i, 'Verzekeringen'],
    [/^water$/i, 'Water'],
    [/^energie$/i, 'Energie'],
    [/^huis(dier)?$/i, raw.toLowerCase() === 'huisdier' ? 'Huisdier' : 'Huis'],
    [/^pensioen$/i, 'Pensioen'],
    [/^overig$/i, 'Overig'],
    [/^variabel$/i, 'Variabel'],
  ];
  for (const [re, label] of aliases) if (re.test(normalized)) return label;
  return raw.charAt(0).toUpperCase() + raw.slice(1);
}
function clone(value){ return JSON.parse(JSON.stringify(value)); }
function monthKey(date=new Date()){
  return date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0');
}
function previousMonthKey(key){
  const [y,m] = String(key||monthKey()).split('-').map(Number);
  const d = new Date(y, (m||1)-2, 1);
  return monthKey(d);
}
function monthLabel(key){
  const [y,m] = String(key||monthKey()).split('-').map(Number);
  const d = new Date(y, (m||1)-1, 1);
  return d.toLocaleDateString('nl-NL', {month:'long', year:'numeric'});
}
function monthOptions(centerKey=getSelectedMonth()){
  const [y] = String(centerKey||monthKey()).split('-').map(Number);
  const years = [y-1, y, y+1];
  return years.flatMap(year => Array.from({length:12}, (_,i)=> monthKey(new Date(year, i, 1))));
}
function yearsWithMonthData(selected=getSelectedMonth()){
  const years = new Set([String(selected).slice(0,4), String(monthKey()).slice(0,4)]);
  Object.keys(state.monthlyIncome || {}).forEach(key=>{ if (/^\d{4}-\d{2}$/.test(key)) years.add(key.slice(0,4)); });
  Object.keys(state.monthlyBudgets || {}).forEach(key=>{ if (/^\d{4}-\d{2}$/.test(key)) years.add(key.slice(0,4)); });
  (state.transactions || []).forEach(tx=>{
    const key = transactionMonth(tx);
    if (/^\d{4}-\d{2}$/.test(key)) years.add(key.slice(0,4));
  });
  return Array.from(years).map(Number).filter(Number.isFinite).sort((a,b)=>a-b);
}
function transactionMonth(tx){ return String(tx.date||'').slice(0,7); }
function getSelectedMonth(){
  if (!state?.meta?.selectedMonth) return monthKey();
  return state.meta.selectedMonth;
}
function setSelectedMonth(value){
  if (!/^\d{4}-\d{2}$/.test(String(value||''))) return;
  state.meta.selectedMonth = value;
  ensureMonthData(value);
}
function ensureMonthData(month=getSelectedMonth()){
  state.meta.selectedMonth = state.meta.selectedMonth || monthKey();
  state.monthlyIncome = isPlainObject(state.monthlyIncome) ? state.monthlyIncome : {};
  state.monthlyBudgets = isPlainObject(state.monthlyBudgets) ? state.monthlyBudgets : {};
  state.transactions = Array.isArray(state.transactions) ? state.transactions : [];
  state.monthlyIncome[month] = state.monthlyIncome[month] || {
    dion: Number(state.personen?.dion?.salaris)||0,
    dara: Number(state.personen?.dara?.salaris)||0
  };
  state.monthlyBudgets[month] = state.monthlyBudgets[month] || {};
  ['voor','na'].forEach(scenario=>{
    if (!state.monthlyBudgets[month][scenario]){
      state.monthlyBudgets[month][scenario] = {
        gezamenlijkVariabel: clone(state[scenario]?.gezamenlijk?.variabel || [])
      };
    }
  });
}
function normalizeGoalDefaults(){
  ['gezamenlijk','dion','dara'].forEach(group=>{
    (state.spaardoelen?.[group]||[]).forEach(goal=>{
      if (!goal.rendementPeriode) goal.rendementPeriode = 'jaarlijks';
      if (!['jaarlijks','maandelijks'].includes(goal.rendementPeriode)) goal.rendementPeriode = 'jaarlijks';
      if (goal.favoriet === undefined) goal.favoriet = false;
    });
  });
}
function normalizePersonDefaults(target){
  target.personen = isPlainObject(target.personen) ? target.personen : {};
  ['dion','dara'].forEach(person=>{
    target.personen[person] = isPlainObject(target.personen[person]) ? target.personen[person] : {};
    target.personen[person].naam = target.personen[person].naam || (person === 'dion' ? 'Dion' : 'Dara');
    target.personen[person].salaris = Number(target.personen[person].salaris)||0;
    const rows = Array.isArray(target.personen[person].vasteTeruggaven) ? target.personen[person].vasteTeruggaven : [];
    target.personen[person].vasteTeruggaven = rows.filter(isPlainObject).map(row=>({
      id: row.id || uid(),
      omschrijving: row.omschrijving ?? row.post ?? '',
      bedrag: Number(row.bedrag)||0
    }));
  });
}
function normalizeBudgetState(candidate){
  const normalized = candidate || defaultState();
  normalized.meta = isPlainObject(normalized.meta) ? normalized.meta : {};
  normalized.meta.scenario = ['voor','na'].includes(normalized.meta.scenario) ? normalized.meta.scenario : 'voor';
  normalized.meta.selectedMonth = normalized.meta.selectedMonth || monthKey();
  normalized.monthlyIncome = isPlainObject(normalized.monthlyIncome) ? normalized.monthlyIncome : {};
  normalized.monthlyBudgets = isPlainObject(normalized.monthlyBudgets) ? normalized.monthlyBudgets : {};
  normalized.transactions = Array.isArray(normalized.transactions) ? normalized.transactions : [];
  normalizePersonDefaults(normalized);
  state = normalized;
  ensureMonthData(normalized.meta.selectedMonth);
  normalizeGoalDefaults();
  return normalized;
}
function getMonthlyBaseIncome(person){
  const month = getSelectedMonth();
  ensureMonthData(month);
  const monthly = Number(state.monthlyIncome?.[month]?.[person]);
  if (Number.isFinite(monthly) && monthly !== 0) return monthly;
  return Number(state.personen?.[person]?.salaris)||0;
}
function sumVasteTeruggaven(person){
  return sumBedrag(state.personen?.[person]?.vasteTeruggaven || []);
}
function getTotalMonthlyIncome(person){
  return round2(getMonthlyBaseIncome(person) + sumVasteTeruggaven(person));
}
function getMonthlyIncome(person){
  return getMonthlyBaseIncome(person);
}
function setMonthlyIncome(person, amount){
  const month = getSelectedMonth();
  ensureMonthData(month);
  state.monthlyIncome[month][person] = Number(amount)||0;
}
function getMonthlyScenarioData(scenario=state.meta.scenario){
  const month = getSelectedMonth();
  ensureMonthData(month);
  const base = state[scenario];
  const monthly = state.monthlyBudgets?.[month]?.[scenario];
  return {
    ...base,
    gezamenlijk: {
      ...base.gezamenlijk,
      variabel: monthly?.gezamenlijkVariabel || base.gezamenlijk.variabel
    }
  };
}
function getMonthTransactions(owner=null, month=getSelectedMonth()){
  return (state.transactions||[]).filter(tx => transactionMonth(tx) === month && (!owner || tx.owner === owner));
}
function sumTransactions(owner=null, category=null, month=getSelectedMonth()){
  return round2(getMonthTransactions(owner, month).reduce((sum, tx)=>{
    if (category){
      const txCat = String(tx.category||'').toLowerCase();
      const wanted = String(category).toLowerCase();
      if (!(txCat === wanted || txCat.includes(wanted) || wanted.includes(txCat))) return sum;
    }
    return sum + (Number(tx.amount)||0);
  }, 0));
}
function transactionsByCategory(owner, month=getSelectedMonth()){
  const totals = {};
  getMonthTransactions(owner, month).forEach(tx=>{
    const key = tx.category || 'Overig';
    totals[key] = round2((totals[key]||0) + (Number(tx.amount)||0));
  });
  return totals;
}
function budgetStatus(used, budget){
  if (!budget) return {ratio:0, label:'Geen budget', cls:'muted'};
  const ratio = used / budget;
  if (ratio > 1) return {ratio, label:'Overschreden', cls:'red'};
  if (ratio >= .85) return {ratio, label:'Bijna vol', cls:'amber'};
  return {ratio, label:'Op schema', cls:''};
}
function textSafe(value){
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function goalIcon(goal){
  const name = String(goal?.naam || '').toLowerCase();
  if (/vakantie|reis|travel|vliegtuig|japan|fonds/.test(name)) return '✈';
  if (/buffer|nood|reserve|veilig/.test(name)) return '◈';
  if (/beleg|invest|aandeel/.test(name)) return '↗';
  if (/koffie|coffee/.test(name)) return '☕';
  if (/huis|inrichting|wonen|keuken|tuin/.test(name)) return '⌂';
  if (/hond|dieren|huisdier/.test(name)) return '♡';
  if (/auto|vervoer/.test(name)) return '▣';
  return '◎';
}
function goalStatusBadge(progress){
  if (progress >= 1) return '<span class="status-badge">Op schema</span>';
  if (progress >= .75) return '<span class="status-badge amber">Bijna klaar</span>';
  return '<span class="status-badge muted">Nog te gaan</span>';
}
function renderModernGoalCard(item, owner, opts={}){
  const doel = item.doel || item;
  const doelbedrag = Number(doel.doelbedrag)||0;
  const algespaard = Number(doel.algespaard)||0;
  const progress = doelbedrag > 0 ? Math.min(1, algespaard / doelbedrag) : 0;
  const barPct = Math.round(progress * 100);
  const dateText = doel.doeldatum ? formatDateNL(doel.doeldatum) : 'Geen doeldatum';
  return `<div class="goal-card">
    <div class="goal-card-head">
      <div class="goal-card-title">
        <div class="goal-thumb">${goalIcon(doel)}</div>
        <div>
          <h3>${textSafe(doel.naam || 'Spaardoel')}</h3>
          <div class="goal-owner">${textSafe(owner)}</div>
        </div>
      </div>
      ${goalStatusBadge(progress)}
    </div>
    <div class="goal-money"><span>${eur(algespaard)} van ${eur(doelbedrag)}</span><strong>${barPct}%</strong></div>
    <div class="progress-track"><div class="progress-fill" style="width:${barPct}%"></div></div>
    <div class="goal-card-foot">
      <span>Doel: ${dateText}</span>
      <button class="ghost small" type="button" data-tab-shortcut="${opts.targetTab || 'spaardoelen'}">Bekijk doel</button>
    </div>
  </div>`;
}
function renderModernGoalCards(doelen, pot, owner, limit=null){
  let items = calcGroep(doelen || [], pot, TODAY);
  if (limit) items = items.slice(0, limit);
  if (!items.length) return '<p class="muted-empty">Nog geen spaardoelen.</p>';
  return `<div class="goal-card-grid">${items.map(item=>renderModernGoalCard(item, owner)).join('')}</div>`;
}
function renderManageSection(title, body, open=false){

}

  if (amount < 200) return '<span class="status-badge amber">Krap</span>';
  return '<span class="status-badge">Op schema</span>';
}
function copyPreviousMonth(){
  const month = getSelectedMonth();
  const prev = previousMonthKey(month);
  const fallbackIncome = {dion:Number(state.personen?.dion?.salaris)||0, dara:Number(state.personen?.dara?.salaris)||0};
  const existingIncome = !!state.monthlyIncome?.[month] && JSON.stringify(state.monthlyIncome[month]) !== JSON.stringify(fallbackIncome);
  const defaultBudgets = {};
  ['voor','na'].forEach(scenario=> defaultBudgets[scenario] = { gezamenlijkVariabel: state[scenario]?.gezamenlijk?.variabel || [] });
  const existingBudgets = !!state.monthlyBudgets?.[month] && JSON.stringify(state.monthlyBudgets[month]) !== JSON.stringify(defaultBudgets);
  const existingTransactions = (state.transactions||[]).some(tx=>transactionMonth(tx) === month);
  ensureMonthData(prev);
  const hasData = existingIncome || existingBudgets || existingTransactions;
  if (hasData && !confirm('Deze maand heeft al maanddata. Inkomens en gezamenlijke budgetten overschrijven met vorige maand?')) return false;
  ensureMonthData(month);
  state.monthlyIncome[month] = clone(state.monthlyIncome[prev] || {
    dion: Number(state.personen.dion.salaris)||0,
    dara: Number(state.personen.dara.salaris)||0
  });
  state.monthlyBudgets[month] = clone(state.monthlyBudgets[prev] || {});
  ['voor','na'].forEach(scenario=>{
    if (!state.monthlyBudgets[month][scenario]){
      state.monthlyBudgets[month][scenario] = { gezamenlijkVariabel: clone(state[scenario].gezamenlijk.variabel || []) };
    }
  });
  return true;
}

/* ---------- rekenmotor ---------- */
function monthsRemaining(targetDateStr, today){
  if (!targetDateStr) return null;
  const t = new Date(targetDateStr);
  if (isNaN(t)) return null;
  const months = (t.getFullYear()-today.getFullYear())*12 + (t.getMonth()-today.getMonth());
  return Math.max(1, months);
}
function monthlyRateFromGoal(doel){
  const rate = Number(doel.rendement)||0;
  if (!rate) return 0;
  return doel.rendementPeriode === 'maandelijks' ? rate : Math.pow(1 + rate, 1/12) - 1;
}
function futureValue(current, monthlyFixed, monthlyRate, months){
  current = current || 0; monthlyFixed = monthlyFixed || 0;
  if (!monthlyRate) return current + monthlyFixed*months;
  const i = monthlyRate;
  const growth = Math.pow(1+i, months);
  return current*growth + monthlyFixed*((growth-1)/i);
}
function calcDoel(doel, today){
  const doelbedrag = Number(doel.doelbedrag)||0;
  const algespaard = Number(doel.algespaard)||0;
  const vasteInleg = Number(doel.vasteInleg)||0;
  const rendement = monthlyRateFromGoal(doel);
  const nogTeGaan = Math.max(0, doelbedrag - algespaard);
  const voortgang = doelbedrag>0 ? algespaard/doelbedrag : 0;
  let benodigdPerMaand = null, benodigdeExtraInleg = null, verwachteWaarde = null;
  const months = monthsRemaining(doel.doeldatum, today);
  if (months !== null && doelbedrag > 0){
    const fv = futureValue(algespaard, vasteInleg, rendement, months);
    verwachteWaarde = round2(fv);
    const tekort = doelbedrag - fv;
    if (!rendement){ benodigdeExtraInleg = round2(Math.max(0, tekort/months)); }
    else{
      const i = rendement;
      const annuiteit = (Math.pow(1+i,months)-1)/i;
      benodigdeExtraInleg = round2(Math.max(0, tekort/annuiteit));
    }
    benodigdPerMaand = round2(vasteInleg + benodigdeExtraInleg);
  }
  return { nogTeGaan, voortgang, benodigdPerMaand, benodigdeExtraInleg, verwachteWaarde, months };
}
function calcGroep(doelen, spaarpotDezeMaand, today){
  const berekend = doelen.map(d => ({ doel:d, ...calcDoel(d, today) }));
  // Vaste inleg van ALLE doelen (ook 'alleen vast bedrag'-doelen zoals Beleggen) telt mee als al gecommitteerd.
  const totaalVasteInleg = sumBedrag(doelen.map(d=>({bedrag:d.vasteInleg})));
  // Het extra overschot/tekort wordt alleen naar rato verdeeld over doelen die NIET op 'alleen vast bedrag' staan.
  const verdeelbaar = berekend.filter(b => !b.doel.vastBedrag);
  const totaalBenodigd = round2(verdeelbaar.reduce((s,b)=> s + (b.benodigdPerMaand||0), 0));
  const totaalExtraBenodigd = round2(verdeelbaar.reduce((s,b)=> s + (b.benodigdeExtraInleg||0), 0));
  const extraPot = Math.max(0, (spaarpotDezeMaand||0) - totaalVasteInleg);
  return berekend.map(b=>{
    const vasteInleg = Number(b.doel.vasteInleg)||0;
    if (b.doel.vastBedrag){
      return { ...b, berekendeExtraInleg: 0, werkelijkeInleg: round2(vasteInleg), totaalVasteInleg, totaalBenodigd, totaalExtraBenodigd };
    }
    const extraAandeel = totaalExtraBenodigd>0 ? extraPot * ((b.benodigdeExtraInleg||0)/totaalExtraBenodigd) : 0;
    return { ...b, berekendeExtraInleg: round2(extraAandeel), werkelijkeInleg: round2(vasteInleg + extraAandeel), totaalVasteInleg, totaalBenodigd, totaalExtraBenodigd };
  });
}
function calcScenario(state){
  const scenario = state.meta.scenario;
  const basisInkomenDion = getMonthlyBaseIncome('dion');
  const basisInkomenDara = getMonthlyBaseIncome('dara');
  const vasteTeruggavenDion = sumVasteTeruggaven('dion');
  const vasteTeruggavenDara = sumVasteTeruggaven('dara');
  const salarisDion = round2(basisInkomenDion + vasteTeruggavenDion);
  const salarisDara = round2(basisInkomenDara + vasteTeruggavenDara);
  const totaalSalaris = salarisDion + salarisDara;
  const inkomenRatioDion = totaalSalaris>0 ? salarisDion/totaalSalaris : 0;
  const inkomenRatioDara = totaalSalaris>0 ? salarisDara/totaalSalaris : 0;
  const s = getMonthlyScenarioData(scenario);
  const vasteLastenTotaal = sumEffective(s.gezamenlijk.vasteLasten);
  const variabelBudgetTotaal = sumBedrag(s.gezamenlijk.variabel);
  const variabelTotaal = sumTransactions('gezamenlijk');
  const variabelVoorVerdelingTotaal = Math.max(variabelBudgetTotaal, variabelTotaal);
  const spaarpotDezeMaand = Number(s.spaarpotDezeMaand)||0;

  let effDion, effDara, zakgeldDion, zakgeldDara, hypotheekBedrag = 0;
  if (scenario === 'voor'){
    const minDion = Number(s.verdeling.minimumDion);
    effDion = Math.max(minDion, inkomenRatioDion);
    effDara = 1 - effDion;
    const pot = vasteLastenTotaal + variabelVoorVerdelingTotaal + spaarpotDezeMaand;
    zakgeldDion = round2(salarisDion - pot*effDion);
    zakgeldDara = round2(salarisDara - pot*effDara);
  } else {
    const hypDion = Number(s.verdeling.hypotheekDion);
    const hypDara = 1 - hypDion;
    hypotheekBedrag = sumBedrag(s.gezamenlijk.hypotheek);
    const overigePot = vasteLastenTotaal + variabelVoorVerdelingTotaal + spaarpotDezeMaand;
    zakgeldDion = round2(salarisDion - (hypotheekBedrag*hypDion + overigePot*inkomenRatioDion));
    zakgeldDara = round2(salarisDara - (hypotheekBedrag*hypDara + overigePot*inkomenRatioDara));
    effDion = hypDion; effDara = hypDara;
  }
  function persoonlijk(p, zakgeld){
    const persoonlijkeVasteLasten = sumEffective(s[p].vasteLasten);
    const resterendVoorVariabel = round2(zakgeld - persoonlijkeVasteLasten);
    const variabeleUitgaven = sumTransactions(p);
    const beschikbaarVoorSparen = round2(resterendVoorVariabel - variabeleUitgaven);
    return { persoonlijkeVasteLasten, resterendVoorVariabel, variabeleUitgaven, beschikbaarVoorSparen };
  }
  const dion = { zakgeld: zakgeldDion, ...persoonlijk('dion', zakgeldDion) };
  const dara = { zakgeld: zakgeldDara, ...persoonlijk('dara', zakgeldDara) };
  return {
    basisInkomenDion, basisInkomenDara, vasteTeruggavenDion, vasteTeruggavenDara,
    salarisDion, salarisDara, totaalSalaris, inkomenRatioDion, inkomenRatioDara,
    vasteLastenTotaal: round2(vasteLastenTotaal + hypotheekBedrag),
    gezamenlijkeLastenTotaal: round2(vasteLastenTotaal + hypotheekBedrag + variabelVoorVerdelingTotaal),
    overigeVasteLastenTotaal: vasteLastenTotaal, hypotheekBedrag,
    variabelTotaal, variabelBudgetTotaal, variabelVoorVerdelingTotaal, spaarpotDezeMaand, effDion, effDara, dion, dara
  };
}

function isPlainObject(value){
  return value !== null && typeof value === 'object' && !Array.isArray(value);
}

function validateRows(rows, label, errors){
  if (!Array.isArray(rows)){
    errors.push(label + ' moet een lijst zijn.');
    return;
  }
  rows.forEach((row, i)=>{
    if (!isPlainObject(row)) errors.push(label + '[' + i + '] is geen geldige regel.');
  });
}

function validateGoalRows(rows, label, errors){
  if (!Array.isArray(rows)){
    errors.push(label + ' moet een lijst zijn.');
    return;
  }
  rows.forEach((row, i)=>{
    if (!isPlainObject(row)) errors.push(label + '[' + i + '] is geen geldig spaardoel.');
  });
}

function validateBudgetState(candidate){
  const errors = [];
  if (!isPlainObject(candidate)){
    return { ok:false, errors:['Het bestand bevat geen budgetplanner-gegevens.'] };
  }
  ['meta','personen','voor','na','spaardoelen'].forEach(key=>{
    if (!isPlainObject(candidate[key])) errors.push('Ontbrekend of ongeldig onderdeel: ' + key + '.');
  });
  if (errors.length) return { ok:false, errors };

  if (!['voor','na'].includes(candidate.meta.scenario)){
    errors.push('Scenario moet "voor" of "na" zijn.');
  }
  if (candidate.meta.selectedMonth && !/^\d{4}-\d{2}$/.test(String(candidate.meta.selectedMonth))){
    errors.push('Geselecteerde maand moet de vorm YYYY-MM hebben.');
  }
  ['dion','dara'].forEach(person=>{
    if (!isPlainObject(candidate.personen[person])) errors.push('Persoon ontbreekt: ' + person + '.');
    else if (candidate.personen[person].vasteTeruggaven !== undefined){
      validateRows(candidate.personen[person].vasteTeruggaven, 'personen.' + person + '.vasteTeruggaven', errors);
    }
  });

  ['voor','na'].forEach(scenario=>{
    const s = candidate[scenario];
    if (!isPlainObject(s.verdeling)) errors.push(scenario + '.verdeling ontbreekt.');
    if (!isPlainObject(s.gezamenlijk)) errors.push(scenario + '.gezamenlijk ontbreekt.');
    if (!isPlainObject(s.dion)) errors.push(scenario + '.dion ontbreekt.');
    if (!isPlainObject(s.dara)) errors.push(scenario + '.dara ontbreekt.');
    if (isPlainObject(s.gezamenlijk)){
      validateRows(s.gezamenlijk.vasteLasten, scenario + '.gezamenlijk.vasteLasten', errors);
      validateRows(s.gezamenlijk.variabel, scenario + '.gezamenlijk.variabel', errors);
      if (scenario === 'na') validateRows(s.gezamenlijk.hypotheek, 'na.gezamenlijk.hypotheek', errors);
    }
    ['dion','dara'].forEach(person=>{
      if (isPlainObject(s[person])){
        validateRows(s[person].vasteLasten, scenario + '.' + person + '.vasteLasten', errors);
        validateRows(s[person].variabel, scenario + '.' + person + '.variabel', errors);
      }
    });
  });

  ['gezamenlijk','dion','dara'].forEach(group=>{
    validateGoalRows(candidate.spaardoelen[group], 'spaardoelen.' + group, errors);
  });
  if (candidate.monthlyIncome !== undefined && !isPlainObject(candidate.monthlyIncome)){
    errors.push('monthlyIncome moet een object zijn.');
  }
  if (candidate.monthlyBudgets !== undefined && !isPlainObject(candidate.monthlyBudgets)){
    errors.push('monthlyBudgets moet een object zijn.');
  }
  if (candidate.transactions !== undefined){
    if (!Array.isArray(candidate.transactions)) errors.push('transactions moet een lijst zijn.');
    else candidate.transactions.forEach((tx,i)=>{
      if (!isPlainObject(tx)) errors.push('transactions[' + i + '] is geen geldige transactie.');
    });
  }

  return { ok:errors.length === 0, errors };
}

function loadFirebaseConfig(){

    return {...DEFAULT_FIREBASE_CONFIG, ...JSON.parse(raw)};

function firebaseConfigIsComplete(config){
  return !!(config && config.apiKey && config.authDomain && config.projectId && config.appId);
}

function saveFirebaseConfigFromText(text){
  const parsed = JSON.parse(text);
  const config = {...DEFAULT_FIREBASE_CONFIG, ...parsed};
  if (!firebaseConfigIsComplete(config)){
    throw new Error('Firebase-config mist apiKey, authDomain, projectId of appId.');
  }
  localStorage.setItem(FIREBASE_CONFIG_STORAGE_KEY, JSON.stringify(config));
  return config;
}

const CloudAdapter = {
  app:null, db:null, docRef:null, modules:null, unsubscribe:null,
  status:'Firebase niet verbonden', saveTimer:null, applyingRemote:false,
  config:loadFirebaseConfig(),
  statusText(){ return this.status; },
  isConfigured(){ return firebaseConfigIsComplete(this.config); },
  isConnected(){ return !!(this.db && this.docRef); },
  async loadModules(){
    if (this.modules) return this.modules;
    const base = `https://www.gstatic.com/firebasejs/${FIREBASE_SDK_VERSION}`;
    const [app, firestore] = await Promise.all([
      import(`${base}/firebase-app.js`),
      import(`${base}/firebase-firestore.js`)
    ]);
    this.modules = {app, firestore};
    return this.modules;
  },
  async connect(){
    if (!this.isConfigured()){
      this.status = 'Firebase-config ontbreekt';
      renderCloudStatus();
      return false;
    }
    try{
      this.status = 'Firebase laden...';
      renderCloudStatus();
      const {app, firestore} = await this.loadModules();
      this.app = app.getApps().length ? app.getApps()[0] : app.initializeApp(this.config);
      this.db = firestore.getFirestore(this.app);
      this.docRef = firestore.doc(this.db, FIRESTORE_COLLECTION, FIRESTORE_DOC_ID);
      this.attachSnapshot();
      this.status = 'Firebase live verbonden';
      renderCloudStatus();
      return true;
    }catch(e){
      console.error('Firebase verbinden mislukt', e);
      this.status = 'Firebase-fout: ' + (e && e.message ? e.message : e);
      renderCloudStatus();
      return false;
    }
  },
  attachSnapshot(){
    if (this.unsubscribe || !this.docRef) return;
    const {firestore} = this.modules;
    this.unsubscribe = firestore.onSnapshot(this.docRef, snap=>{
      if (!snap.exists()){
        this.status = 'Firebase verbonden, cloud-document is nog leeg';
        renderCloudStatus();
        return;
      }
      const remote = snap.data().state;
      const validation = validateBudgetState(remote);
      if (!validation.ok){
        console.error('Firestore-data ongeldig', validation.errors);
        this.status = 'Firebase-data ongeldig, lokale data behouden';
        renderCloudStatus();
        return;
      }
      const previousState = state;
      const normalizedRemote = normalizeBudgetState(remote);
      if (JSON.stringify(normalizedRemote) === JSON.stringify(previousState)) return;
      DataAdapter.backup(previousState, 'voor Firestore-sync');
      this.applyingRemote = true;
      state = normalizedRemote;
      window.state = state;
      try{ localSave(state); }catch(e){ console.error('lokale kopie Firestore-data opslaan mislukt', e); }
      this.applyingRemote = false;
      this.status = 'Firebase-data geladen';
      renderActiveTab();
    }, err=>{
      console.error('Firestore live-sync fout', err);
      this.status = 'Firebase live-sync fout: ' + err.message;
      renderCloudStatus();
    });
  },
  queueSave(state){
    if (!this.isConnected() || this.applyingRemote) return;
    clearTimeout(this.saveTimer);
    this.saveTimer = setTimeout(()=> this.saveNow(state), 500);
  },
  async saveNow(state){
    if (!this.isConnected()) return false;
    const validation = validateBudgetState(state);
    if (!validation.ok){
      this.status = 'Niet naar Firebase opgeslagen: lokale data ongeldig';
      renderCloudStatus();
      return false;
    }
    try{
      const {firestore} = this.modules;
      await firestore.setDoc(this.docRef, {
        state,
        updatedAt: firestore.serverTimestamp(),
        updatedBy: 'public-link',
        app: 'finize'
      }, {merge:true});
      this.status = 'Firebase opgeslagen om ' + new Date().toLocaleTimeString('nl-NL');
      renderCloudStatus();
      return true;
    }catch(e){
      console.error('Firestore opslaan mislukt', e);
      this.status = 'Firebase opslaan mislukt: ' + e.message;
      renderCloudStatus();
      return false;
    }
  },
  async signOut(){
    if (this.unsubscribe){ this.unsubscribe(); this.unsubscribe = null; }
    this.app = null;
    this.db = null;
    this.docRef = null;
    this.status = 'Firebase losgekoppeld';
    renderCloudStatus();
  }
};

const DataAdapter = {
  // Lokaal blijft altijd de eerste veiligheidslaag. Firestore is optionele live-sync erbovenop.
  // Firebase Storage is voor losse bestanden; Firestore is de juiste plek voor live app-data.
  // We bewaren dezelfde state-vorm als 1 groot JSON-document voor Finize.
  save(state){
    try{
      localSave(state);
      CloudAdapter.queueSave(state);
      return true;
    }catch(e){ console.error('opslaan mislukt', e); return false; }
  },
  load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      const validation = validateBudgetState(parsed);
      if (!validation.ok){
        console.error('opgeslagen data ongeldig', validation.errors);
        return null;
      }
      return normalizeBudgetState(parsed);
    }catch(e){ console.error('laden mislukt', e); return null; }
  },
  backup(state, reason){
    try{
      localStorage.setItem(BACKUP_STORAGE_KEY, JSON.stringify({
        savedAt: new Date().toISOString(),
        label: backupLabel(),
        reason,
        state
      }));
      return true;
    }catch(e){ console.error('back-up maken mislukt', e); return false; }
  },
  loadBackup(){
    try{
      const raw = localStorage.getItem(BACKUP_STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    }catch(e){ console.error('back-up laden mislukt', e); return null; }
  }
};

    const post = String(a.row.post||'').localeCompare(String(b.row.post||''), 'nl', {sensitivity:'base'});
    if (post) return post;
    return a.index - b.index;
  });

    btn.addEventListener('click', ()=>{

      const arr = getPath(state, path);
      arr.splice(parseInt(idxStr,10), 1);
      persist(); renderActiveTab();
    });
  });
  root.querySelectorAll('[data-move-row]').forEach(select=>{
    select.addEventListener('change', ()=>{
      const targetPath = select.value;
      const [sourcePath, idxStr] = splitLastIndex(select.dataset.moveRow);
      if (!targetPath || targetPath === sourcePath) return;
      const source = getPath(state, sourcePath);
      const target = getPath(state, targetPath);
      if (!Array.isArray(source) || !Array.isArray(target)) return;
      const idx = parseInt(idxStr, 10);
      const row = source.splice(idx, 1)[0];
      if (!row) return;
      target.push(row);
      persist(); renderActiveTab();
    });
  });
  root.querySelectorAll('[data-remove-transaction]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.removeTransaction;
      state.transactions = (state.transactions||[]).filter(tx=>tx.id !== id);
      persist(); renderActiveTab();
    });
  });
  root.querySelectorAll('[data-open-transaction]').forEach(btn=>{
    btn.addEventListener('click', ()=> openTransactionModal());
  });
}
function splitLastIndex(pathWithIndex){
  const parts = pathWithIndex.split('.');
  const idx = parts.pop();
  return [parts.join('.'), idx];
}

function handleGoalClicks(root){
  root.querySelectorAll('[data-move-goal]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const parts = btn.dataset.moveGoal.split('.');
      const direction = parseInt(parts.pop(), 10);
      const idx = parseInt(parts.pop(), 10);
      const path = parts.join('.');
      const arr = getPath(state, path);
      const next = idx + direction;
      if (!Array.isArray(arr) || next < 0 || next >= arr.length) return;
      const item = arr.splice(idx, 1)[0];
      arr.splice(next, 0, item);
      persist(); renderActiveTab();
    });
  });
  root.querySelectorAll('[data-addgoal]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const path = btn.dataset.addgoal;
      const arr = getPath(state, path);
      arr.push({id:uid(), naam:'Nieuw doel', doelbedrag:0, algespaard:0, doeldatum:'', vasteInleg:0, rendement:0.0125, rendementPeriode:'jaarlijks', favoriet:false});
      persist(); renderActiveTab();
    });
  });
}

  const allGoals = [
    ...gGoals.map(g=>({...g, owner:'Gezamenlijk'})),

/* ---------- spaardoelen-tab ---------- */
function renderSpaardoelen(){
  const r = calcScenario(state);
  const groups = [
    {key:'gezamenlijk', label:'Gezamenlijk', pot:r.spaarpotDezeMaand, doelen:state.spaardoelen.gezamenlijk},
    {key:'dion', label:'Dion', pot:r.dion.beschikbaarVoorSparen, doelen:state.spaardoelen.dion},
    {key:'dara', label:'Dara', pot:r.dara.beschikbaarVoorSparen, doelen:state.spaardoelen.dara},
  ];
  const all = groups.flatMap(g=>calcGroep(g.doelen, g.pot, TODAY).map(item=>({...item, owner:g.label})));
  const totaalGespaard = round2(all.reduce((s,b)=>s+(Number(b.doel.algespaard)||0),0));
  const totaalDoel = round2(all.reduce((s,b)=>s+(Number(b.doel.doelbedrag)||0),0));
  const gemiddelde = totaalDoel>0 ? totaalGespaard/totaalDoel : 0;
  const inlegDezeMaand = round2(all.reduce((s,b)=>s+(b.werkelijkeInleg||0),0));
  const groupCards = groups.map(g=>{
    const berekend = calcGroep(g.doelen, g.pot, TODAY);
    const doel = round2(berekend.reduce((s,b)=>s+(Number(b.doel.doelbedrag)||0),0));
    const gespaard = round2(berekend.reduce((s,b)=>s+(Number(b.doel.algespaard)||0),0));
    const p = doel>0 ? gespaard/doel : 0;
    return `<div class="goal-group-block">
      <div class="goal-group-title"><h3>${g.label}</h3><span class="status-badge">${pct(p)}</span></div>
      ${renderModernGoalCards(g.doelen, g.pot, g.label)}
      <div class="card-total"><span>Totaal ${g.label}</span><span>${eur(gespaard)} / ${eur(doel)}</span></div>
    </div>`;
  }).join('');
  const distribution = groups.map(g=>{
    const total = round2(calcGroep(g.doelen, g.pot, TODAY).reduce((s,b)=>s+(Number(b.doel.doelbedrag)||0),0));
    const ratio = totaalDoel > 0 ? total / totaalDoel : 0;
    return `<div class="progress-item"><div class="progress-top"><strong>${g.label}</strong><span>${eur(total)} · ${pct(ratio)}</span></div><div class="progress-track"><div class="progress-fill" style="width:${Math.round(ratio*100)}%"></div></div></div>`;
  }).join('');
  document.getElementById('tab-spaardoelen').innerHTML = `
    ${renderAppSection('Overzicht', 'Spaardoelen overzicht', 'Alle doelen als moderne voortgangskaarten, met beheer lager op de pagina.', `
      <div class="overview-kpi-row cols-4">
        <div class="card metric-card span-3"><div class="metric-label">Totaal gespaard</div><div class="metric-value value pos">${eur(totaalGespaard)}</div><div class="metric-sub">${all.length} actieve spaardoelen</div></div>
        <div class="card metric-card span-3"><div class="metric-label">Totaal doelbedrag</div><div class="metric-value">${eur(totaalDoel)}</div><div class="metric-sub">alle groepen samen</div></div>
        <div class="card metric-card span-3"><div class="metric-label">Gemiddelde voortgang</div><div class="metric-value">${pct(gemiddelde)}</div><div class="metric-sub">op basis van gespaard/doel</div></div>
        <div class="card metric-card span-3"><div class="metric-label">Inleg deze maand</div><div class="metric-value">${eur(inlegDezeMaand)}</div><div class="metric-sub">${monthLabel(getSelectedMonth())}</div></div>
      </div>`)}
    ${renderAppSection('Voortgang', 'Spaardoelen overzicht', '', `<div class="card">${groupCards}</div>`)}
    ${renderAppSection('Verdeling', 'Verdeling van spaardoelen', 'Doelbedrag per groep.', `<div class="card"><div class="progress-list">${distribution}</div></div>`)}
    ${renderAppSection('Beheer', 'Spaardoelen beheren', 'De volledige bewerktabellen blijven beschikbaar in deze beheerblokken.', `
      <div class="manage-stack">
        ${renderManageSection('Spaardoelen beheren — Gezamenlijk', `<div class="card">${renderGoalGroup('spaardoelen.gezamenlijk', state.spaardoelen.gezamenlijk, r.spaarpotDezeMaand)}</div>`, false)}
        ${renderManageSection('Spaardoelen beheren — Dion', `<div class="card">${renderGoalGroup('spaardoelen.dion', state.spaardoelen.dion, r.dion.beschikbaarVoorSparen)}</div>`, false)}
        ${renderManageSection('Spaardoelen beheren — Dara', `<div class="card">${renderGoalGroup('spaardoelen.dara', state.spaardoelen.dara, r.dara.beschikbaarVoorSparen)}</div>`, false)}
      </div>`)}
  `;
}
/* ---------- data & back-up tab ---------- */
function renderDataTab(){
  document.getElementById('tab-data').innerHTML = `
    <div class="card">
      <div class="card-head"><h2>Back-up</h2><span class="hint">lokaal herstelpunt en JSON</span></div>
      <div class="toolbar">
        <button class="primary" id="btnExport">Exporteer back-up (JSON)</button>
        <button class="ghost" id="btnImport">Importeer back-up</button>
        <button class="ghost" id="btnRestoreBackup">Herstel laatste lokale back-up</button>
        <button class="ghost" id="btnReset" style="border-color:var(--red);color:var(--red)">Alles wissen</button>
      </div>
      <input type="file" id="fileImport" accept="application/json" style="display:none">
    </div>
    <div class="card">
      <div class="card-head"><h2>Firebase / Firestore</h2><span class="hint" id="cloudStatus">${CloudAdapter.statusText()}</span></div>
      <textarea id="firebaseConfigInput" spellcheck="false" placeholder="${firebaseConfigTemplate().replaceAll('"','&quot;')}">${CloudAdapter.isConfigured() ? JSON.stringify(CloudAdapter.config, null, 2) : ''}</textarea>
      <div class="toolbar" style="margin-top:8px">
        <button class="ghost small" id="btnSaveFirebaseConfig">Firebase-config opslaan</button>
        <button class="primary small" id="btnConnectFirebase">Verbinden met cloud</button>
        <button class="ghost small" id="btnUploadCloud">Lokale stand naar cloud zetten</button>
        <button class="ghost small" id="btnFirebaseSignOut">Cloud loskoppelen</button>
      </div>
      <pre>Firestore rules voor openbaar lezen en bewerken:
rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /budgetPlanners/finize {
      allow read, write: if true;
    }
  }
}</pre>
    </div>
  `;
  document.getElementById('btnExport').addEventListener('click', ()=>{
    downloadJson('dion-dara-budget-backup-' + new Date().toISOString().slice(0,10) + '.json', state);
  });
  document.getElementById('btnImport').addEventListener('click', ()=> document.getElementById('fileImport').click());
  document.getElementById('fileImport').addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      try{
        const imported = JSON.parse(ev.target.result);
        const validation = validateBudgetState(imported);
        if (!validation.ok){
          alert('Deze back-up is niet geimporteerd:\n\n' + validation.errors.slice(0,6).join('\n'));
          e.target.value = '';
          return;
        }
        if (!confirm('Deze import vervangt alle huidige gegevens. De huidige stand wordt eerst als lokale nood-back-up bewaard. Doorgaan?')){
          e.target.value = '';
          return;
        }
        DataAdapter.backup(state, 'voor import van ' + file.name);
        state = normalizeBudgetState(imported); window.state = state;
        persist();
        renderActiveTab();
        alert('Back-up geimporteerd.');
      }catch(err){ alert('Kon dit bestand niet lezen: ' + err.message); }
      e.target.value = '';
    };
    reader.readAsText(file);
  });
  document.getElementById('btnRestoreBackup').addEventListener('click', ()=>{
    const backup = DataAdapter.loadBackup();
    if (!backup || !backup.state){
      alert('Er is nog geen lokale nood-back-up gevonden.');
      return;
    }
    const validation = validateBudgetState(backup.state);
    if (!validation.ok){
      alert('De lokale nood-back-up is ongeldig:\n\n' + validation.errors.slice(0,6).join('\n'));
      return;
    }
    const label = backup.label || backup.savedAt || 'onbekend moment';
    if (confirm('Laatste lokale nood-back-up herstellen van ' + label + '? De huidige stand wordt eerst opnieuw als nood-back-up bewaard.')){
      DataAdapter.backup(state, 'voor herstel lokale nood-back-up');
      state = normalizeBudgetState(backup.state); window.state = state;
      persist();
      renderActiveTab();
    }
  });
  document.getElementById('btnReset').addEventListener('click', ()=>{
    if (confirm('Weet je zeker dat je alle gegevens wilt wissen en opnieuw wilt beginnen? De huidige stand wordt eerst als lokale nood-back-up bewaard.')){
      DataAdapter.backup(state, 'voor alles wissen');
      state = normalizeBudgetState(defaultState()); window.state = state;
      persist();
      renderActiveTab();
    }
  });
  document.getElementById('btnSaveFirebaseConfig').addEventListener('click', ()=>{
    try{
      CloudAdapter.config = saveFirebaseConfigFromText(document.getElementById('firebaseConfigInput').value);
      CloudAdapter.status = 'Firebase-config opgeslagen';
      renderCloudStatus();
    }catch(err){
      alert('Firebase-config niet opgeslagen: ' + err.message);
    }
  });
  document.getElementById('btnConnectFirebase').addEventListener('click', async ()=>{
    await CloudAdapter.connect();
  });
  document.getElementById('btnUploadCloud').addEventListener('click', async ()=>{
    if (!CloudAdapter.isConnected()){
      const connected = await CloudAdapter.connect();
      if (!connected) return;
    }
    if (confirm('Lokale stand naar Firestore schrijven? Dit overschrijft het Finize cloud-document.')){
      await CloudAdapter.saveNow(state);
    }
  });
  document.getElementById('btnFirebaseSignOut').addEventListener('click', async ()=>{
    await CloudAdapter.signOut();
  });
}

function renderMonthSelect(){
  const button = document.getElementById('monthPickerButton');
  const panel = document.getElementById('monthPickerPanel');
  if (!button || !panel) return;
  const selected = getSelectedMonth();
  const [selectedYear, selectedMonth] = selected.split('-').map(Number);
  const yearOptions = yearsWithMonthData(selected);
  const currentMonthKey = monthKey();
  const monthNames = ['Jan','Feb','Mrt','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];
  button.textContent = monthLabel(selected);
  button.setAttribute('aria-expanded', document.getElementById('monthControl')?.classList.contains('open') ? 'true' : 'false');
  panel.innerHTML = `
    <div class="year-picker">
      ${yearOptions.map(year=>`<button type="button" data-month-year="${year}" class="${year===selectedYear?'active':''}">${year}</button>`).join('')}
    </div>
    <div class="month-grid">
      ${monthNames.map((name,i)=>{
        const month = i + 1;
        const key = selectedYear + '-' + String(month).padStart(2,'0');
        const classes = [key===selected ? 'active' : '', key===currentMonthKey ? 'current' : ''].filter(Boolean).join(' ');
        return `<button type="button" data-month-value="${key}" class="${classes}">${name}</button>`;
      }).join('')}
    </div>`;
}

        </select></label>
        <label class="full">Notitie<input id="txNote" type="text" placeholder="Optioneel"></label>
      </div>
      <div class="modal-actions">
        <button class="ghost" id="btnCancelTransaction">Annuleren</button>
        <button class="primary" id="btnSaveTransaction">Uitgave opslaan</button>
      </div>
    </div>`;
  modal.classList.add('open');
  const close = ()=> modal.classList.remove('open');
  document.getElementById('btnCloseTransaction').addEventListener('click', close);
  document.getElementById('btnCancelTransaction').addEventListener('click', close);
  modal.addEventListener('click', (e)=>{ if (e.target === modal) close(); }, {once:true});
  document.getElementById('btnSaveTransaction').addEventListener('click', ()=>{
    const amount = parseFloat(String(document.getElementById('txAmount').value).replace(',', '.'));
    if (!Number.isFinite(amount) || amount <= 0){
      alert('Vul een geldig bedrag in.');
      return;
    }
    const tx = {
      id: uid(),
      date: document.getElementById('txDate').value || today,
      owner: document.getElementById('txOwner').value,
      category: document.getElementById('txCategory').value,
      description: document.getElementById('txDescription').value.trim(),
      amount: round2(amount),
      note: document.getElementById('txNote').value.trim()
    };
    state.transactions.push(tx);
    persist();
    close();
    renderActiveTab();
  });
}

/* ---------- routing / init ---------- */
function renderActiveTab(){
  ensureMonthData(getSelectedMonth());
  renderMonthSelect();
  document.querySelectorAll('.tab-btn').forEach(b=> b.classList.toggle('active', b.dataset.tab===activeTab));
  document.querySelectorAll('.wrap').forEach(w=> w.classList.toggle('active', w.id === 'tab-'+activeTab));
  document.querySelectorAll('#scenarioToggle button').forEach(b=> b.classList.toggle('active', b.dataset.scenario===state.meta.scenario));

  if (activeTab==='dashboard') renderDashboard();
  else if (activeTab==='gezamenlijk') renderPersonOrJoint('tab-gezamenlijk','gezamenlijk','Gezamenlijk');
  else if (activeTab==='dion') renderPersonOrJoint('tab-dion','dion','Dion');
  else if (activeTab==='dara') renderPersonOrJoint('tab-dara','dara','Dara');
  else if (activeTab==='spaardoelen') renderSpaardoelen();
  else if (activeTab==='data') renderDataTab();

  const root = document.getElementById('tab-'+activeTab);
  bindInputs(root);
  handleTableClicks(root);
  handleGoalClicks(root);
  root.querySelectorAll('[data-tab-shortcut]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      activeTab = btn.dataset.tabShortcut;
      renderActiveTab();
    });
  });
}

document.getElementById('tabs').addEventListener('click', (e)=>{
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  activeTab = btn.dataset.tab;
  renderActiveTab();
});
document.getElementById('saveStatus').addEventListener('click', ()=>{
  activeTab = 'data';
  renderActiveTab();
});
document.getElementById('scenarioToggle').addEventListener('click', (e)=>{
  const btn = e.target.closest('button');
  if (!btn) return;
  state.meta.scenario = btn.dataset.scenario;
  persist();
  renderActiveTab();
});
document.getElementById('monthPickerButton').addEventListener('click', (e)=>{
  e.stopPropagation();
  const control = document.getElementById('monthControl');
  if (control.classList.contains('open')) closeMonthPicker();
  else openMonthPicker();
});
document.getElementById('monthPickerPanel').addEventListener('click', (e)=>{
  const yearBtn = e.target.closest('[data-month-year]');
  if (yearBtn){
    const currentMonth = getSelectedMonth().slice(5,7);
    setSelectedMonth(yearBtn.dataset.monthYear + '-' + currentMonth);
    persist();
    renderActiveTab();
    openMonthPicker();
    return;
  }
  const monthBtn = e.target.closest('[data-month-value]');
  if (monthBtn){
    setSelectedMonth(monthBtn.dataset.monthValue);
    persist();
    closeMonthPicker();
    renderActiveTab();
  }
});
document.addEventListener('click', (e)=>{
  if (!document.getElementById('monthControl')?.contains(e.target)) closeMonthPicker();
});
document.addEventListener('keydown', (e)=>{
  if (e.key === 'Escape') closeMonthPicker();
});
document.getElementById('btnCopyPreviousMonth').addEventListener('click', ()=>{
  if (copyPreviousMonth()){
    persist();
    renderActiveTab();
  }
});

renderActiveTab();
CloudAdapter.connect();

</script>
</body>
